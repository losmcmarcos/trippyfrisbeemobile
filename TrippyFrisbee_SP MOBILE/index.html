<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRIPPY FRISBEE - FULL MOBILE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        * { touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; overflow: hidden; background: #081a05; font-family: 'VT323', monospace; color: white; image-rendering: pixelated; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.95); z-index: 50; text-align: center; }
        #overlay h1 { font-size: clamp(45px, 15vw, 85px); text-shadow: 5px 5px #d34; margin: 0; line-height: 0.8; }
        
        .btn { padding: 15px 40px; background: #d34; color: white; border: 4px solid white; cursor: pointer; margin-top: 30px; font-size: 28px; font-family: 'VT323', monospace; box-shadow: 5px 5px #000; }
        
        .char-container { display: flex; gap: 20px; margin: 30px 0; }
        .char-card { border: 4px solid #555; padding: 5px; background: rgba(0,0,0,0.5); width: clamp(100px, 25vw, 150px); transition: 0.3s; }
        .char-card img { width: 100%; height: auto; aspect-ratio: 3/4; object-fit: cover; }
        .char-card.selected { border-color: #fff; box-shadow: 0 0 20px #fff; transform: scale(1.05); }
        
        #ui-ingame { position: absolute; top: 15px; left: 15px; pointer-events: none; text-shadow: 2px 2px #000; z-index: 10; display: none; font-size: clamp(18px, 5vw, 28px); }
        #controls-ui { position: absolute; top: 15px; right: 15px; text-align: right; pointer-events: none; text-shadow: 2px 2px #000; z-index: 10; display: none; font-size: clamp(14px, 4vw, 18px); color: #aaa; }
        
        #touch-controls { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; display: none; }
        .touch-zone { position: absolute; height: 100%; width: 33.3%; }
        
        #trippy-subs { position: absolute; bottom: 15%; width: 100%; text-align: center; font-size: clamp(24px, 7vw, 40px); color: #fff; text-shadow: 3px 3px #000; z-index: 40; pointer-events: none; display: none; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="screen-title">
            <h1>TRIPPY FRISBEE</h1>
            <p style="color: #666; letter-spacing: 2px;">MOBILE ARCADE</p>
            <button class="btn" onclick="goToSelect()">INSERT COIN</button>
        </div>
        <div id="screen-select" style="display:none;">
            <h2>SELECT HERO</h2>
            <div class="char-container">
                <div class="char-card" id="card-ale" onclick="selectChar('Alessandro')"><img src="ale.jpeg"><h3>ALE</h3></div>
                <div class="char-card" id="card-gug" onclick="selectChar('Guglielmo')"><img src="gug.jpeg"><h3>GUG</h3></div>
            </div>
            <button class="btn" id="startBtn" style="opacity:0.3; pointer-events:none;">START</button>
        </div>
    </div>

    <div id="ui-ingame">
        <div id="score-txt">SCORE: 000</div>
        <div id="poison-txt" style="color: lime;">STATUS: SOBER</div>
    </div>
  
    <div id="controls-ui"><b>TOUCH SIDES</b>: MOVE<br><b>CENTER</b>: THROW</div>

    <div id="touch-controls">
        <div id="touch-left" class="touch-zone" style="left:0;"></div>
        <div id="touch-throw" class="touch-zone" style="left:33.3%;"></div>
        <div id="touch-right" class="touch-zone" style="left:66.6%;"></div>
    </div>

    <div id="trippy-subs"></div>
    <canvas id="gameCanvas"></canvas>

<script>
// ASSETS & SOUNDS
const imgPatNick = new Image(); imgPatNick.src = 'patnick.jpeg';
const sounds = {
    soundtrack: new Audio('sountrack.mp3'),
    frisbee: [new Audio('fx_frisbee1.mp3'), new Audio('fx_frisbee2.mp3'), new Audio('fx_frisbee3.mp3')],
    merda: [new Audio('fx_merda1.mp3'), new Audio('fx_merda2.mp3'), new Audio('fx_merda3.mp3')],
    point: new Audio('fx_point.mp3'),
    schianto: new Audio('fx_schianto.mp3')
};
sounds.soundtrack.loop = true;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let score = 0, gameState = 'MENU', poisonedLevel = 0, keys = {}, selectedPlayerName = null;
let userRole = 'bottom', frameCount = 0;

// GAME OBJECTS (Ripristinati e scalati)
const tree = { x: 0, y: 0, trunkW: 45, trunkH: 70, opening: 130, branchWidth: 240, branchLength: 150, offsetX: 0, drift: 0 };
const players = { top: { x: 0, y: 80, speed: 7 }, bottom: { x: 0, y: 0, speed: 7 } };
const frisbee = { x: 0, y: 0, r: 8, vy: 0, active: false, owner: 'bottom', trail: [], passedThroughBranches: false };
const musicNpc = { x: 0, y: 0, anim: 0 };
const spiders = [];
const musicalNotes = [];

let activeHallucination = null;
let hallucinationCooldown = 0;

// UI LOGIC
function goToSelect() { sounds.soundtrack.play().catch(()=>{}); document.getElementById('screen-title').style.display = 'none'; document.getElementById('screen-select').style.display = 'block'; }
function selectChar(name) {
    selectedPlayerName = name; userRole = (name === 'Alessandro') ? 'bottom' : 'top';
    document.getElementById('card-ale').classList.toggle('selected', name === 'Alessandro');
    document.getElementById('card-gug').classList.toggle('selected', name === 'Guglielmo');
    document.getElementById('startBtn').style.opacity = "1"; document.getElementById('startBtn').style.pointerEvents = "auto";
}

document.getElementById('startBtn').addEventListener('click', () => {
    gameState = 'PLAYING';
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('ui-ingame').style.display = 'block';
    document.getElementById('controls-ui').style.display = 'block';
    document.getElementById('touch-controls').style.display = 'block';
    setupPositions();
});

function setupPositions() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    tree.x = canvas.width / 2; tree.y = canvas.height / 2;
    players.top.x = canvas.width / 2; players.top.y = 80;
    players.bottom.x = canvas.width / 2; players.bottom.y = canvas.height - 110;
    musicNpc.x = canvas.width - 60; musicNpc.y = canvas.height / 2;
    resetFrisbee();
}

function resetFrisbee() {
    frisbee.active = false; frisbee.trail = []; frisbee.passedThroughBranches = false;
    frisbee.x = frisbee.owner === 'bottom' ? players.bottom.x : players.top.x;
    frisbee.y = frisbee.owner === 'bottom' ? players.bottom.y - 40 : players.top.y + 40;
}

// TOUCH & INPUT
const touchState = { left: false, right: false };
document.getElementById('touch-left').addEventListener('touchstart', (e) => { e.preventDefault(); touchState.left = true; });
document.getElementById('touch-left').addEventListener('touchend', () => touchState.left = false);
document.getElementById('touch-right').addEventListener('touchstart', (e) => { e.preventDefault(); touchState.right = true; });
document.getElementById('touch-right').addEventListener('touchend', () => touchState.right = false);
document.getElementById('touch-throw').addEventListener('touchstart', (e) => { e.preventDefault(); launch(userRole); });
window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'Space') launch(userRole); });
window.addEventListener('keyup', e => keys[e.code] = false);

function launch(p) {
    if (!frisbee.active && frisbee.owner === p) {
        frisbee.active = true; frisbee.vy = (p === 'bottom') ? -11 : 11;
        try { sounds.frisbee[0].currentTime = 0; sounds.frisbee[0].play(); } catch(e){}
    }
}

// ENGINE
function update() {
    if (gameState !== 'PLAYING') return;
    frameCount++;
    
    musicNpc.anim = Math.sin(frameCount * 0.15) * 5;
    poisonedLevel = Math.floor(score / 3);
    let tripPerc = poisonedLevel * 15;
    
    // UI Trip
    let pTxt = document.getElementById('poison-txt');
    if (score >= 3) {
        pTxt.innerText = "STATUS: TRIPPING ("+tripPerc+"%)"; pTxt.style.color = "#f0f"; pTxt.classList.add('blink');
        tree.drift += 0.005 + (poisonedLevel * 0.002);
        tree.offsetX = Math.sin(tree.drift) * (canvas.width * 0.3);
    } else {
        pTxt.innerText = "STATUS: SOBER"; pTxt.style.color = "lime"; pTxt.classList.remove('blink');
        tree.offsetX = 0;
    }

    // NPC Musico & Note
    if (frameCount % 30 === 0) {
        musicalNotes.push({ x: musicNpc.x - 20, y: musicNpc.y, vx: -1, vy: -1, opacity: 1, char: '♪' });
    }
    musicalNotes.forEach((n, i) => { n.x += n.vx; n.y += n.vy; n.opacity -= 0.01; if(n.opacity <= 0) musicalNotes.splice(i, 1); });

    // Ragni
    if (tripPerc >= 45 && spiders.length < Math.min(poisonedLevel, 8) && Math.random() > 0.98) {
        spiders.push({ x: Math.random()*canvas.width, y: -20, vy: 1+Math.random()*2, legAnim: 0 });
    }
    spiders.forEach((s, i) => { s.y += s.vy; s.legAnim += 0.2; if(s.y > canvas.height) spiders.splice(i, 1); });

    // Hallucinations
    if (hallucinationCooldown > 0) hallucinationCooldown--;
    if (!activeHallucination && hallucinationCooldown <= 0 && tripPerc >= 60) {
        activeHallucination = { type: tripPerc >= 90 ? 'Pat' : 'Nick', timer: 180, side: tripPerc >= 90 ? 'right' : 'left' };
        document.getElementById('trippy-subs').innerText = activeHallucination.type === 'Pat' ? "let's fucking drink a beer" : "it's gonna get better guys";
        document.getElementById('trippy-subs').style.display = 'block';
    }
    if (activeHallucination) {
        activeHallucination.timer--;
        if (activeHallucination.timer <= 0) { activeHallucination = null; document.getElementById('trippy-subs').style.display = 'none'; hallucinationCooldown = 400; }
    }

    // Movimento
    let user = players[userRole];
    if ((keys['ArrowLeft'] || touchState.left) && user.x > 30) user.x -= user.speed;
    if ((keys['ArrowRight'] || touchState.right) && user.x < canvas.width - 30) user.x += user.speed;

    let cpu = players[userRole === 'bottom' ? 'top' : 'bottom'];
    let targetX = frisbee.active ? frisbee.x : user.x;
    if (cpu.x < targetX - 5) cpu.x += 5; else if (cpu.x > targetX + 5) cpu.x -= 5;

    // Frisbee & Collisioni
    if (frisbee.active) {
        frisbee.y += frisbee.vy;
        frisbee.trail.push({x: frisbee.x, y: frisbee.y});
        if (frisbee.trail.length > 8) frisbee.trail.shift();

        const relX = frisbee.x - (tree.x + tree.offsetX);
        if (Math.abs(frisbee.y - tree.y) < 20) {
            if (Math.abs(relX) > tree.opening/2 && Math.abs(relX) < tree.branchWidth/2) {
                try { sounds.schianto.play(); sounds.merda[0].play(); } catch(e){}
                score = Math.max(0, score - 1); resetFrisbee();
            } else if (Math.abs(relX) <= tree.opening/2) { frisbee.passedThroughBranches = true; }
        }

        if (Math.hypot(frisbee.x - players.top.x, frisbee.y - players.top.y) < 40) { 
            if(frisbee.vy < 0 && frisbee.passedThroughBranches) { score++; try{sounds.point.play();}catch(e){} }
            frisbee.owner = 'top'; resetFrisbee(); 
        }
        if (Math.hypot(frisbee.x - players.bottom.x, frisbee.y - players.bottom.y) < 40) { 
            if(frisbee.vy > 0 && frisbee.passedThroughBranches) { score++; try{sounds.point.play();}catch(e){} }
            frisbee.owner = 'bottom'; resetFrisbee(); 
        }
        if (frisbee.y < -50 || frisbee.y > canvas.height + 50) resetFrisbee();
    } else {
        if (frisbee.owner !== userRole && Math.random() > 0.95) launch(frisbee.owner);
    }
}

function draw() {
    ctx.fillStyle = '#1e3d1a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (gameState !== 'PLAYING') { requestAnimationFrame(draw); return; }

    // Scanlines trippy
    if (poisonedLevel > 0) {
        ctx.save(); ctx.globalAlpha = 0.1 * poisonedLevel;
        ctx.fillStyle = '#fff'; ctx.fillRect(0, (frameCount*2)%canvas.height, canvas.width, 2);
        ctx.restore();
    }

    // ALBERO
    ctx.save(); ctx.translate(tree.x + tree.offsetX, tree.y);
    ctx.fillStyle = '#3d2514'; ctx.fillRect(-tree.trunkW/2, 0, tree.trunkW, tree.trunkH);
    [-1, 1].forEach(s => {
        ctx.beginPath(); ctx.moveTo(s*tree.trunkW/2, 5);
        ctx.lineTo(s*tree.branchWidth/2, -tree.branchLength/3);
        ctx.lineTo(s*tree.opening/2, -tree.branchLength);
        ctx.lineTo(s*tree.opening/2 - s*20, -tree.branchLength);
        ctx.lineTo(s*tree.branchWidth/2 - s*20, -tree.branchLength/3 + 10);
        ctx.fill();
    });
    ctx.restore();

    // NPC & NOTE
    ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(musicNpc.x, musicNpc.y, 15, 0, Math.PI*2); ctx.fill();
    musicalNotes.forEach(n => { ctx.globalAlpha = n.opacity; ctx.fillStyle = 'white'; ctx.fillText(n.char, n.x, n.y); ctx.globalAlpha = 1; });

    // FRISBEE
    frisbee.trail.forEach((t, i) => { ctx.fillStyle = `rgba(220, 255, 0, ${i/10})`; ctx.beginPath(); ctx.arc(t.x, t.y, frisbee.r*(i/8), 0, Math.PI*2); ctx.fill(); });
    ctx.fillStyle = '#dfff00'; ctx.beginPath(); ctx.arc(frisbee.x, frisbee.y, frisbee.r, 0, Math.PI*2); ctx.fill();

    // PLAYERS
    [players.bottom, players.top].forEach((p, i) => {
        ctx.save(); ctx.translate(p.x, p.y);
        let isGug = (i === 1 && selectedPlayerName === 'Alessandro') || (i === 0 && selectedPlayerName === 'Guglielmo');
        ctx.fillStyle = isGug ? '#431' : '#d34'; 
        ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ffd393'; ctx.beginPath(); ctx.arc(0, isGug?0:3, 14, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    });

    // RAGNI
    spiders.forEach(s => {
        ctx.strokeStyle = '#111'; ctx.beginPath(); ctx.moveTo(s.x, 0); ctx.lineTo(s.x, s.y); ctx.stroke();
        ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(s.x, s.y, 6, 0, Math.PI*2); ctx.fill();
    });

    // ALLUCINAZIONI
    if (activeHallucination) {
        ctx.save();
        let isNick = activeHallucination.type === 'Nick';
        let sx = isNick ? 550 : 50, sw = 450, sh = 800;
        let dw = canvas.width * 0.45, dh = dw * 1.8;
        ctx.globalAlpha = 0.7;
        ctx.drawImage(imgPatNick, sx, 0, sw, sh, isNick?0:canvas.width-dw, canvas.height-dh, dw, dh);
        ctx.restore();
    }

    update(); requestAnimationFrame(draw);
}

window.addEventListener('resize', setupPositions);
setupPositions(); draw();
</script>
</body>
</html>
