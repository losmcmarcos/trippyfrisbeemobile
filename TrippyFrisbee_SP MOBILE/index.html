<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRIPPY FRISBEE - MOBILE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        * { touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; overflow: hidden; background: #081a05; font-family: 'VT323', monospace; color: white; image-rendering: pixelated; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.95); z-index: 20; text-align: center; }
        #overlay h1 { font-size: clamp(40px, 15vw, 80px); text-shadow: 5px 5px #d34; margin: 0; }
        .btn { padding: 10px 40px; background: #d34; color: white; border: 4px solid white; cursor: pointer; margin-top: 20px; font-size: 24px; font-family: 'VT323', monospace; box-shadow: 4px 4px #000; }
        .char-container { display: flex; gap: 15px; margin: 20px 0; }
        .char-card { border: 4px solid #555; padding: 5px; background: rgba(0,0,0,0.5); width: 110px; transition: 0.3s; }
        .char-card img { width: 100%; height: 130px; object-fit: cover; }
        .char-card.selected { border-color: #fff; box-shadow: 0 0 15px #fff; transform: translateY(-5px); }
        #ui-ingame { position: absolute; top: 10px; left: 10px; pointer-events: none; text-shadow: 2px 2px #000; z-index: 10; display: none; font-size: 22px; }
        #controls-ui { position: absolute; top: 10px; right: 10px; text-align: right; pointer-events: none; text-shadow: 2px 2px #000; z-index: 10; display: none; font-size: 16px; color: #aaa; }
        #touch-controls { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; display: none; }
        .touch-zone { position: absolute; height: 100%; width: 33.3%; }
        #trippy-subs { position: absolute; bottom: 18%; width: 100%; text-align: center; font-size: 28px; text-shadow: 3px 3px #000; z-index: 30; pointer-events: none; display: none; padding: 0 20px; box-sizing: border-box; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="screen-title">
            <h1>TRIPPY FRISBEE</h1>
            <button class="btn" onclick="goToSelect()">INSERT COIN</button>
        </div>
        <div id="screen-select" style="display:none;">
            <h2>SELECT HERO</h2>
            <div class="char-container">
                <div class="char-card" id="card-ale" onclick="selectChar('Alessandro')"><img src="ale.jpeg"><h3>ALE</h3></div>
                <div class="char-card" id="card-gug" onclick="selectChar('Guglielmo')"><img src="gug.jpeg"><h3>GUG</h3></div>
            </div>
            <button class="btn" id="startBtn" style="opacity:0.3; pointer-events:none;">START</button>
        </div>
    </div>

    <div id="ui-ingame">
        <div id="score-txt">SCORE: 000</div>
        <div id="poison-txt" style="color: lime;">STATUS: SOBER</div>
    </div>
  
    <div id="controls-ui"><b>TOUCH SIDES</b>: MOVE<br><b>CENTER</b>: THROW</div>

    <div id="touch-controls">
        <div id="touch-left" class="touch-zone" style="left:0;"></div>
        <div id="touch-throw" class="touch-zone" style="left:33.3%;"></div>
        <div id="touch-right" class="touch-zone" style="left:66.6%;"></div>
    </div>

    <div id="trippy-subs"></div>
    <canvas id="gameCanvas"></canvas>

<script>
// Carichiamo l'immagine combinata che hai inviato
const imgPatNick = new Image(); 
imgPatNick.src = 'patnick.jpeg'; 

const sounds = {
    soundtrack: new Audio('sountrack.mp3'),
    frisbee: [new Audio('fx_frisbee1.mp3'), new Audio('fx_frisbee2.mp3'), new Audio('fx_frisbee3.mp3')],
    merda: [new Audio('fx_merda1.mp3'), new Audio('fx_merda2.mp3'), new Audio('fx_merda3.mp3')],
    point: new Audio('fx_point.mp3'),
    schianto: new Audio('fx_schianto.mp3')
};
sounds.soundtrack.loop = true;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let score = 0, gameState = 'MENU', poisonedLevel = 0, keys = {}, selectedPlayerName = null;
let userRole = 'bottom', frameCount = 0;

// ALBERO RIMPICCIOLITO per mobile
const tree = { x: 0, y: 0, trunkW: 40, trunkH: 60, opening: 110, branchWidth: 200, branchLength: 130, offsetX: 0, drift: 0 };
const players = { top: { x: 0, y: 70, speed: 6 }, bottom: { x: 0, y: 0, speed: 6 } };
const frisbee = { x: 0, y: 0, r: 7, vy: 0, active: false, owner: 'bottom', trail: [] };

let activeHallucination = null;
let hallucinationCooldown = 0;

function goToSelect() { sounds.soundtrack.play().catch(()=>{}); document.getElementById('screen-title').style.display = 'none'; document.getElementById('screen-select').style.display = 'block'; }
function selectChar(name) {
    selectedPlayerName = name; userRole = (name === 'Alessandro') ? 'bottom' : 'top';
    document.getElementById('card-ale').classList.toggle('selected', name === 'Alessandro');
    document.getElementById('card-gug').classList.toggle('selected', name === 'Guglielmo');
    document.getElementById('startBtn').style.opacity = "1"; document.getElementById('startBtn').style.pointerEvents = "auto";
}

document.getElementById('startBtn').addEventListener('click', () => {
    gameState = 'PLAYING';
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('ui-ingame').style.display = 'block';
    document.getElementById('controls-ui').style.display = 'block';
    document.getElementById('touch-controls').style.display = 'block';
    setupPositions();
});

function setupPositions() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    tree.x = canvas.width / 2; tree.y = canvas.height / 2;
    players.top.x = canvas.width / 2;
    players.bottom.x = canvas.width / 2; players.bottom.y = canvas.height - 100;
    resetFrisbee();
}

function resetFrisbee() {
    frisbee.active = false; frisbee.trail = [];
    frisbee.x = frisbee.owner === 'bottom' ? players.bottom.x : players.top.x;
    frisbee.y = frisbee.owner === 'bottom' ? players.bottom.y - 35 : players.top.y + 35;
}

// Touch Logic
const touchState = { left: false, right: false };
document.getElementById('touch-left').ontouchstart = (e) => { e.preventDefault(); touchState.left = true; };
document.getElementById('touch-left').ontouchend = () => touchState.left = false;
document.getElementById('touch-right').ontouchstart = (e) => { e.preventDefault(); touchState.right = true; };
document.getElementById('touch-right').ontouchend = () => touchState.right = false;
document.getElementById('touch-throw').ontouchstart = (e) => { e.preventDefault(); launch(userRole); };

function launch(p) {
    if (!frisbee.active && frisbee.owner === p) {
        frisbee.active = true; frisbee.vy = (p === 'bottom') ? -9 : 9;
    }
}

function update() {
    if (gameState !== 'PLAYING') return;
    frameCount++;
    poisonedLevel = Math.floor(score / 3);
    let tripPerc = poisonedLevel * 15;
    
    if (score >= 3) {
        tree.drift += 0.006;
        tree.offsetX = Math.sin(tree.drift) * (canvas.width * 0.25);
        document.getElementById('poison-txt').innerText = "STATUS: TRIPPING ("+tripPerc+"%)";
    }

    // Hallucinations (Nick / Pat)
    if (hallucinationCooldown > 0) hallucinationCooldown--;
    if (!activeHallucination && hallucinationCooldown <= 0 && tripPerc >= 60) {
        activeHallucination = { 
            type: tripPerc >= 90 ? 'Pat' : 'Nick', 
            timer: 180, 
            side: tripPerc >= 90 ? 'right' : 'left',
            text: tripPerc >= 90 ? "let's fucking drink a beer" : "it's gonna get better guys"
        };
        document.getElementById('trippy-subs').innerText = activeHallucination.text;
        document.getElementById('trippy-subs').style.display = 'block';
    }
    if (activeHallucination) {
        activeHallucination.timer--;
        if (activeHallucination.timer <= 0) { activeHallucination = null; document.getElementById('trippy-subs').style.display = 'none'; hallucinationCooldown = 400; }
    }

    let user = players[userRole];
    if (touchState.left && user.x > 20) user.x -= user.speed;
    if (touchState.right && user.x < canvas.width - 20) user.x += user.speed;

    let cpu = players[userRole === 'bottom' ? 'top' : 'bottom'];
    let targetX = frisbee.active ? frisbee.x : user.x;
    if (cpu.x < targetX) cpu.x += 4; else cpu.x -= 4;

    if (frisbee.active) {
        frisbee.y += frisbee.vy;
        frisbee.trail.push({x: frisbee.x, y: frisbee.y});
        if (frisbee.trail.length > 6) frisbee.trail.shift();
        
        // Collisione Albero (Rimpicciolita)
        const relX = frisbee.x - (tree.x + tree.offsetX);
        if (Math.abs(frisbee.y - tree.y) < 20 && Math.abs(relX) > tree.opening/2 && Math.abs(relX) < tree.branchWidth/2) {
            score = Math.max(0, score - 1); resetFrisbee();
        }

        if (Math.hypot(frisbee.x - players.top.x, frisbee.y - players.top.y) < 30) { if(frisbee.vy < 0) score++; frisbee.owner = 'top'; resetFrisbee(); }
        if (Math.hypot(frisbee.x - players.bottom.x, frisbee.y - players.bottom.y) < 30) { if(frisbee.vy > 0) score++; frisbee.owner = 'bottom'; resetFrisbee(); }
        if (frisbee.y < 0 || frisbee.y > canvas.height) resetFrisbee();
    }
    document.getElementById('score-txt').innerText = "SCORE: " + score.toString().padStart(3, '0');
}

function draw() {
    ctx.fillStyle = '#1e3d1a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (gameState === 'PLAYING') {
        // Disegno Albero
        ctx.save(); ctx.translate(tree.x + tree.offsetX, tree.y);
        ctx.fillStyle = '#3d2514'; ctx.fillRect(-tree.trunkW/2, 0, tree.trunkW, tree.trunkH);
        ctx.fillStyle = '#1e3d1a'; // Apertura rami
        [-1, 1].forEach(s => {
            ctx.fillStyle = '#3d2514';
            ctx.beginPath(); ctx.moveTo(s*tree.trunkW/2, 0); 
            ctx.lineTo(s*tree.branchWidth/2, -tree.branchLength/2);
            ctx.lineTo(s*tree.opening/2, -tree.branchLength); ctx.fill();
        });
        ctx.restore();

        // Frisbee
        ctx.fillStyle = '#dfff00'; ctx.beginPath(); ctx.arc(frisbee.x, frisbee.y, frisbee.r, 0, Math.PI*2); ctx.fill();

        // Players (Ale / Gug)
        [players.bottom, players.top].forEach((p, i) => {
            ctx.save(); ctx.translate(p.x, p.y);
            let isGug = (i === 0 && selectedPlayerName === 'Guglielmo') || (i === 1 && selectedPlayerName === 'Alessandro');
            ctx.fillStyle = isGug ? '#431' : '#d34'; // Capelli/Cappello
            ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#ffd393'; ctx.beginPath(); ctx.arc(0, isGug?0:2, 13, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        });

        // ALLUCINAZIONI - Ritagliate da patnick.jpeg
        if (activeHallucination) {
            ctx.save();
            ctx.globalAlpha = 0.8;
            let isNick = activeHallucination.type === 'Nick';
            // Coordinate di ritaglio approssimative per l'immagine inviata (Nick a destra, Pat a sinistra)
            let sx = isNick ? 600 : 100; 
            let sw = 400, sh = 800;
            let dw = canvas.width * 0.4, dh = dw * 1.8;
            let dx = isNick ? 0 : canvas.width - dw;
            ctx.drawImage(imgPatNick, sx, 0, sw, sh, dx, canvas.height - dh, dw, dh);
            ctx.restore();
        }
    }
    update(); requestAnimationFrame(draw);
}
setupPositions(); draw();
</script>
</body>
</html>
