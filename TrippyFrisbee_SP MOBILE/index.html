<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRIPPY FRISBEE - ULTIMATE MOBILE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        * { touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; overflow: hidden; background: #081a05; font-family: 'VT323', monospace; color: white; image-rendering: pixelated; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.95); z-index: 100; text-align: center; }
        #overlay h1 { font-size: clamp(50px, 15vw, 90px); text-shadow: 5px 5px #d34; margin: 0; }
        .btn { padding: 15px 40px; background: #d34; color: white; border: 4px solid white; cursor: pointer; margin-top: 30px; font-size: 28px; font-family: 'VT323', monospace; box-shadow: 5px 5px #000; }
        
        .char-container { display: flex; gap: 20px; margin: 30px 0; }
        .char-card { border: 4px solid #555; padding: 5px; background: rgba(0,0,0,0.5); width: 120px; transition: 0.3s; text-align: center; }
        .char-card img { width: 100%; height: 150px; object-fit: cover; border: 2px solid #333; }
        .char-card.selected { border-color: #fff; box-shadow: 0 0 20px #fff; transform: scale(1.05); }
        
        #ui-ingame { position: absolute; top: 15px; left: 15px; pointer-events: none; text-shadow: 2px 2px #000; z-index: 10; display: none; font-size: 24px; }
        #controls-ui { position: absolute; top: 15px; right: 15px; text-align: right; pointer-events: none; text-shadow: 2px 2px #000; z-index: 10; display: none; font-size: 16px; color: #aaa; }
        
        #touch-controls { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; display: none; }
        .touch-zone { position: absolute; height: 100%; width: 33.3%; }
        
        #trippy-subs { position: absolute; bottom: 20%; width: 100%; text-align: center; font-size: clamp(24px, 8vw, 42px); color: #fff; text-shadow: 4px 4px #000; z-index: 80; pointer-events: none; display: none; padding: 0 20px; box-sizing: border-box; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>TRIPPY FRISBEE</h1>
        <div id="screen-title">
            <button class="btn" onclick="goToSelect()">INSERT COIN</button>
        </div>
        <div id="screen-select" style="display:none;">
            <div class="char-container">
                <div class="char-card" id="card-ale" onclick="selectChar('Alessandro')"><img src="ale.jpeg"><h3>ALE</h3></div>
                <div class="char-card" id="card-gug" onclick="selectChar('Guglielmo')"><img src="gug.jpeg"><h3>GUG</h3></div>
            </div>
            <button class="btn" id="startBtn" style="opacity:0.3; pointer-events:none;">START</button>
        </div>
    </div>

    <div id="ui-ingame">
        <div id="score-txt">SCORE: 000</div>
        <div id="poison-txt" style="color: lime;">STATUS: SOBER</div>
    </div>
  
    <div id="controls-ui"><b>SIDES</b>: MOVE (2D)<br><b>CENTER</b>: THROW</div>

    <div id="touch-controls">
        <div id="touch-left" class="touch-zone" style="left:0;"></div>
        <div id="touch-throw" class="touch-zone" style="left:33.3%;"></div>
        <div id="touch-right" class="touch-zone" style="left:66.6%;"></div>
    </div>

    <div id="trippy-subs"></div>
    <canvas id="gameCanvas"></canvas>

<script>
// --- ASSET & SETUP ---
const imgPatNick = new Image(); imgPatNick.src = 'patnick.jpeg';
const sounds = {
    soundtrack: new Audio('sountrack.mp3'),
    frisbee: new Audio('fx_frisbee1.mp3'),
    merda: new Audio('fx_merda1.mp3'),
    point: new Audio('fx_point.mp3'),
    schianto: new Audio('fx_schianto.mp3')
};
sounds.soundtrack.loop = true;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let score = 0, gameState = 'MENU', poisonedLevel = 0, selectedPlayerName = null;
let userRole = 'bottom', frameCount = 0;

// Oggetti di gioco
const tree = { x: 0, y: 0, trunkW: 45, trunkH: 75, opening: 130, branchWidth: 250, branchLength: 160, offsetX: 0, drift: 0 };
const players = { 
    top: { x: 0, y: 80, speed: 7, skin: '#ffd393', hair: '#431' }, 
    bottom: { x: 0, y: 0, speed: 7, skin: '#ffd393', hair: '#d34' } 
};
const frisbee = { x: 0, y: 0, r: 9, vy: 0, active: false, owner: 'bottom', trail: [], passedThroughBranches: false };
const musicNpc = { x: 0, y: 0, anim: 0 };
const spiders = [];
const musicalNotes = [];
let activeHallucination = null;
let hallucinationCooldown = 0;

// --- GESTIONE INPUT ---
const touchState = { left: false, right: false, center: false };
document.getElementById('touch-left').ontouchstart = (e) => { e.preventDefault(); touchState.left = true; };
document.getElementById('touch-left').ontouchend = () => touchState.left = false;
document.getElementById('touch-right').ontouchstart = (e) => { e.preventDefault(); touchState.right = true; };
document.getElementById('touch-right').ontouchend = () => touchState.right = false;
document.getElementById('touch-throw').ontouchstart = (e) => { e.preventDefault(); touchState.center = true; launch(userRole); };
document.getElementById('touch-throw').ontouchend = () => touchState.center = false;

function goToSelect() { sounds.soundtrack.play().catch(()=>{}); document.getElementById('screen-title').style.display = 'none'; document.getElementById('screen-select').style.display = 'block'; }
function selectChar(name) {
    selectedPlayerName = name; userRole = (name === 'Alessandro') ? 'bottom' : 'top';
    document.getElementById('card-ale').classList.toggle('selected', name === 'Alessandro');
    document.getElementById('card-gug').classList.toggle('selected', name === 'Guglielmo');
    document.getElementById('startBtn').style.opacity = "1"; document.getElementById('startBtn').style.pointerEvents = "auto";
}

document.getElementById('startBtn').addEventListener('click', () => {
    gameState = 'PLAYING';
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('ui-ingame').style.display = 'block';
    document.getElementById('controls-ui').style.display = 'block';
    document.getElementById('touch-controls').style.display = 'block';
    setupPositions();
});

function setupPositions() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    tree.x = canvas.width / 2; tree.y = canvas.height / 2;
    players.top.y = 80;
    players.bottom.y = canvas.height - 110;
    musicNpc.x = canvas.width - 50; musicNpc.y = canvas.height / 2;
}

function launch(p) {
    if (!frisbee.active && frisbee.owner === p) {
        frisbee.active = true; frisbee.vy = (p === 'bottom') ? -12 : 12;
        try { sounds.frisbee.currentTime = 0; sounds.frisbee.play(); } catch(e){}
    }
}

function resetFrisbee() {
    frisbee.active = false; frisbee.trail = []; frisbee.passedThroughBranches = false;
}

// --- CORE ENGINE ---
function update() {
    if (gameState !== 'PLAYING') return;
    frameCount++;
    poisonedLevel = Math.floor(score / 3);
    let tripPerc = poisonedLevel * 15;

    // Movimento 2D Giocatore
    let user = players[userRole];
    if (touchState.left) user.x -= user.speed;
    if (touchState.right) user.x += user.speed;
    // Movimento Y: se premi entrambi i lati o il centro, ti avvicini all'albero
    if (touchState.center && userRole === 'bottom' && user.y > tree.y + 110) user.y -= 3;
    if (!touchState.center && userRole === 'bottom' && user.y < canvas.height - 110) user.y += 2;
    
    user.x = Math.max(30, Math.min(canvas.width - 30, user.x));

    // CPU Specchiata
    let cpu = players[userRole === 'bottom' ? 'top' : 'bottom'];
    cpu.x += (user.x - cpu.x) * 0.1;
    cpu.y = canvas.height - user.y;

    // Frisbee Magnetico
    if (!frisbee.active) {
        let ownerObj = players[frisbee.owner];
        frisbee.x = ownerObj.x;
        frisbee.y = (frisbee.owner === 'bottom') ? ownerObj.y - 40 : ownerObj.y + 40;
    } else {
        frisbee.y += frisbee.vy;
        frisbee.trail.push({x: frisbee.x, y: frisbee.y});
        if (frisbee.trail.length > 10) frisbee.trail.shift();

        // Collisione Albero Oscillante
        const relX = frisbee.x - (tree.x + tree.offsetX);
        if (Math.abs(frisbee.y - tree.y) < 25) {
            if (Math.abs(relX) > tree.opening/2 && Math.abs(relX) < tree.branchWidth/2) {
                try { sounds.schianto.play(); sounds.merda.play(); } catch(e){}
                score = Math.max(0, score - 1); resetFrisbee();
            } else if (Math.abs(relX) <= tree.opening/2) { frisbee.passedThroughBranches = true; }
        }

        // Prese
        if (Math.hypot(frisbee.x - players.top.x, frisbee.y - players.top.y) < 40 && frisbee.vy < 0) {
            if (frisbee.passedThroughBranches) { score++; try{sounds.point.play();}catch(e){} }
            frisbee.owner = 'top'; resetFrisbee();
        }
        if (Math.hypot(frisbee.x - players.bottom.x, frisbee.y - players.bottom.y) < 40 && frisbee.vy > 0) {
            if (frisbee.passedThroughBranches) { score++; try{sounds.point.play();}catch(e){} }
            frisbee.owner = 'bottom'; resetFrisbee();
        }
        if (frisbee.y < -50 || frisbee.y > canvas.height + 50) resetFrisbee();
    }

    if (!frisbee.active && frisbee.owner !== userRole && Math.random() > 0.97) launch(frisbee.owner);

    // Eventi: Ragni e Note
    if (tripPerc >= 30 && spiders.length < 4 && Math.random() > 0.99) spiders.push({ x: Math.random()*canvas.width, y: -20, vy: 1.5, legAnim: 0 });
    spiders.forEach((s, i) => { s.y += s.vy; s.legAnim += 0.2; if(s.y > canvas.height) spiders.splice(i, 1); });
    
    if (frameCount % 45 === 0) musicalNotes.push({ x: musicNpc.x, y: musicNpc.y, o: 1, vx: -1.5 });
    musicalNotes.forEach((n, i) => { n.x += n.vx; n.y -= 1; n.o -= 0.01; if(n.o <= 0) musicalNotes.splice(i, 1); });

    // UI & Trip logic
    document.getElementById('score-txt').innerText = "SCORE: " + score.toString().padStart(3, '0');
    let pTxt = document.getElementById('poison-txt');
    if (score >= 3) {
        tree.drift += 0.006 + (poisonedLevel * 0.001);
        tree.offsetX = Math.sin(tree.drift) * (canvas.width * 0.25);
        pTxt.innerText = "STATUS: TRIPPING ("+tripPerc+"%)"; pTxt.style.color = "#f0f"; pTxt.classList.add('blink');
    } else {
        tree.offsetX = 0; pTxt.innerText = "STATUS: SOBER"; pTxt.style.color = "lime"; pTxt.classList.remove('blink');
    }

    // Allucinazioni Nick/Pat
    if (hallucinationCooldown > 0) hallucinationCooldown--;
    if (!activeHallucination && hallucinationCooldown <= 0 && tripPerc >= 60) {
        activeHallucination = { type: tripPerc >= 90 ? 'Pat' : 'Nick', timer: 180 };
        document.getElementById('trippy-subs').innerText = activeHallucination.type === 'Pat' ? "let's fucking drink a beer" : "it's gonna get better guys";
        document.getElementById('trippy-subs').style.display = 'block';
    }
    if (activeHallucination) { activeHallucination.timer--; if(activeHallucination.timer <= 0) { activeHallucination = null; document.getElementById('trippy-subs').style.display = 'none'; hallucinationCooldown = 500; } }
}

// --- RENDER ---
function draw() {
    ctx.fillStyle = '#1e3d1a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (gameState !== 'PLAYING') { requestAnimationFrame(draw); return; }

    // Disegno Albero (Dettagliato)
    ctx.save(); ctx.translate(tree.x + tree.offsetX, tree.y);
    ctx.fillStyle = '#3d2514'; ctx.fillRect(-tree.trunkW/2, 0, tree.trunkW, tree.trunkH);
    [-1, 1].forEach(s => {
        ctx.beginPath(); ctx.moveTo(s*tree.trunkW/2, 5); 
        ctx.lineTo(s*tree.branchWidth/2, -tree.branchLength/3);
        ctx.lineTo(s*tree.opening/2, -tree.branchLength); 
        ctx.lineTo(s*tree.opening/2 - s*25, -tree.branchLength);
        ctx.lineTo(s*tree.branchWidth/2 - s*25, -tree.branchLength/3 + 15);
        ctx.fill();
    });
    ctx.restore();

    // Musico NPC
    ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(musicNpc.x, musicNpc.y + Math.sin(frameCount*0.2)*5, 18, 0, Math.PI*2); ctx.fill();
    musicalNotes.forEach(n => { ctx.globalAlpha = n.o; ctx.fillStyle = 'white'; ctx.font = "20px VT323"; ctx.fillText('♪', n.x, n.y); ctx.globalAlpha = 1; });

    // Frisbee e Scia
    frisbee.trail.forEach((t, i) => { ctx.fillStyle = `rgba(220, 255, 0, ${i/12})`; ctx.beginPath(); ctx.arc(t.x, t.y, frisbee.r*(i/10), 0, Math.PI*2); ctx.fill(); });
    ctx.fillStyle = '#dfff00'; ctx.beginPath(); ctx.arc(frisbee.x, frisbee.y, frisbee.r, 0, Math.PI*2); ctx.fill();

    // Personaggi (Ale e Gug con dettagli originali)
    [players.bottom, players.top].forEach((p, i) => {
        ctx.save(); ctx.translate(p.x, p.y);
        let isGug = (i === 1 && selectedPlayerName === 'Alessandro') || (i === 0 && selectedPlayerName === 'Guglielmo');
        
        // Base corpo/capelli
        ctx.fillStyle = isGug ? '#431' : '#d34'; 
        ctx.beginPath(); ctx.arc(0, 0, 24, 0, Math.PI*2); ctx.fill();
        
        // Faccia
        ctx.fillStyle = '#ffd393'; ctx.beginPath(); ctx.arc(0, isGug?0:4, 18, 0, Math.PI*2); ctx.fill();
        
        // Dettaglio Barba Rossa per Alessandro
        if(!isGug) {
            ctx.fillStyle = '#941'; ctx.beginPath(); ctx.arc(0, 8, 12, 0, Math.PI); ctx.fill();
        }
        ctx.restore();
    });

    // Ragni con gambe animate
    spiders.forEach(s => {
        ctx.strokeStyle = '#111'; ctx.beginPath(); ctx.moveTo(s.x, 0); ctx.lineTo(s.x, s.y); ctx.stroke();
        ctx.save(); ctx.translate(s.x, s.y);
        ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2); ctx.fill();
        for(let j=0; j<4; j++) {
            let legY = Math.sin(s.legAnim + j) * 5;
            ctx.beginPath(); ctx.moveTo(-3, 0); ctx.lineTo(-12, -5+j*3+legY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(3, 0); ctx.lineTo(12, -5+j*3-legY); ctx.stroke();
        }
        ctx.restore();
    });

    // Barra dei Funghi (UI Trip)
    let mushroomCount = Math.min(poisonedLevel, 10);
    for (let m = 0; m < mushroomCount; m++) {
        let mx = canvas.width - 40 - (m * 35); let my = canvas.height - 40;
        ctx.fillStyle = '#d34'; ctx.beginPath(); ctx.arc(mx, my - 10, 12, Math.PI, 0); ctx.fill();
        ctx.fillStyle = '#eee'; ctx.fillRect(mx - 4, my - 10, 8, 10);
    }

    // Allucinazioni Nick/Pat
    if (activeHallucination) {
        ctx.save();
        let isNick = activeHallucination.type === 'Nick';
        let progress = (180 - activeHallucination.timer) / 180;
        ctx.globalAlpha = progress < 0.1 ? progress * 10 : (progress > 0.9 ? (1 - progress) * 10 : 0.7);
        let dw = canvas.width * 0.55, dh = dw * 1.6;
        ctx.drawImage(imgPatNick, isNick?550:50, 0, 450, 800, isNick?0:canvas.width-dw, canvas.height-dh, dw, dh);
        ctx.restore();
    }

    update(); requestAnimationFrame(draw);
}

window.addEventListener('resize', setupPositions);
setupPositions(); draw();
</script>
</body>
</html>
